<svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <!-- Card background (deep dark purple) -->
  <rect x="14" y="14" width="228" height="228" rx="22" fill="#120820"/>

  <!-- Outer card border (gold) -->
  <rect x="14" y="14" width="228" height="228" rx="22" fill="none" stroke="#F5D03B" stroke-width="5"/>

  <!-- Inner decorative border (bright purple) -->
  <rect x="26" y="26" width="204" height="204" rx="14" fill="none" stroke="#9E42F5" stroke-width="2.5"/>

  <!--
    Circular refresh arrows centred at (128,128), radius 55.
    Arc 1 runs clockwise from 335° to 140° (right + bottom half).
    Arc 2 runs clockwise from 155° to 320° (left + top half).
    A 15° gap on each side leaves room for the arrowhead triangles.
  -->

  <!-- Arc 1: 335° → 140°, clockwise, large-arc-flag=0 sweep-flag=1 -->
  <path d="M 177.8,104.8 A 55,55 0 0,1 85.9,163.4"
        fill="none" stroke="white" stroke-width="10"/>

  <!-- Arc 2: 155° → 320°, clockwise, large-arc-flag=0 sweep-flag=1 -->
  <path d="M 78.2,151.2 A 55,55 0 0,1 170.1,92.6"
        fill="none" stroke="white" stroke-width="10"/>

  <!--
    Arrowhead at end of Arc 1 (at 140°).
    Travel direction at 140° clockwise: (−sin140°, cos140°) ≈ (−0.643, −0.766).
    Tip=(85.9,163.4), base extends 16 units backward, half-width 8.
  -->
  <polygon points="85.9,163.4 90.0,180.8 102.3,170.5" fill="white"/>

  <!--
    Arrowhead at end of Arc 2 (at 320°).
    Travel direction at 320° clockwise: (−sin320°, cos320°) ≈ (0.643, 0.766).
    Tip=(170.1,92.6), base extends 16 units backward, half-width 8.
  -->
  <polygon points="170.1,92.6 165.9,75.2 153.7,85.4" fill="white"/>

  <!-- Corner card-suit accents -->
  <!-- ♠ spade — top-left, white -->
  <text x="48" y="54" font-size="22" fill="white"
        text-anchor="middle" font-family="serif">&#9824;</text>
  <!-- ♥ heart — top-right, red -->
  <text x="208" y="54" font-size="22" fill="#E03030"
        text-anchor="middle" font-family="serif">&#9829;</text>
  <!-- ♦ diamond — bottom-left, red -->
  <text x="48" y="220" font-size="22" fill="#E03030"
        text-anchor="middle" font-family="serif">&#9830;</text>
  <!-- ♣ club — bottom-right, white -->
  <text x="208" y="220" font-size="22" fill="white"
        text-anchor="middle" font-family="serif">&#9827;</text>
</svg>
